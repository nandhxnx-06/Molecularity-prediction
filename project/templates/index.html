<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drug Solubility Predictor</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #38bdf8;
            font-weight: bold;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #020617;
            font-size: 18px;
            color: #22c55e;
            font-weight: bold;
        }

        .smiles {
            color: #38bdf8;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1> Molecule Solubility Predictor</h1>
        <p>Enter SMILES notation to predict solubility</p>

        <form action="/predict" method="POST">
            <input type="text" name="smiles" placeholder="e.g. CCO" required>
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <div class="result">
                Solubility: {{ prediction }}
                <div class="smiles">SMILES: {{ smiles }}</div>
            </div>
        {% endif %}
    </div>

</body>
</html>
